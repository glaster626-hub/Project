  <title>Platform Web Design</title>
  <style>
    .video-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .video-container iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
    }

    @media (max-width: 600px) {
      .video-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
