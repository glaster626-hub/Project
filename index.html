<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Egg Clicker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="title">🥚 Egg Clicker</h1>

<div class="top">

Яиц: <span id="eggs">0</span>

|

сек: <span id="eps">0</span>

|

Перерождения: <span id="rebirth">0</span>

</div>

<div class="game">

<div class="eggArea">

<div id="egg">🥚</div>

<p>Клик: <span id="clickPower">1</span></p>

</div>


<div class="panel">

<h2>🏭 Постройки</h2>

<div id="buildings"></div>

<h2>⚡ Улучшения</h2>

<div id="upgrades"></div>

<h2>🔥 Перерождение</h2>

<button onclick="doRebirth()" class="rebirthBtn">

Переродиться

</button>

</div>


<div class="panel">

<h2>🏆 Достижения</h2>

<div id="achievements"></div>

</div>

</div>

<div id="achievementPopup"></div>

<script src="script.js"></script>

</body>
</html>
